<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档上传与解析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: #fafafa;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background: #e8f0fe;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-text {
            color: #666;
            margin-bottom: 15px;
        }

        .upload-text strong {
            color: #667eea;
        }

        .file-types {
            color: #999;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        /* 文件信息 */
        .file-info {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: left;
        }

        .file-info.show {
            display: block;
        }

        .file-info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .file-info-item:last-child {
            border-bottom: none;
        }

        .file-info-label {
            color: #666;
        }

        .file-info-value {
            color: #333;
            font-weight: 500;
        }

        /* 按钮 */
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        /* 进度条 */
        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #666;
        }

        /* 文档列表 */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-bar select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            min-width: 150px;
        }

        .filter-bar input {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .btn-refresh {
            background: #f0f0f0;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #fafafa;
            font-weight: 600;
            color: #333;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-pdf { background: #ff4757; color: white; }
        .badge-docx { background: #2f80ed; color: white; }
        .badge-xlsx { background: #27ae60; color: white; }
        .badge-pptx { background: #e67e22; color: white; }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .modal-body {
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .chunk-item {
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .chunk-meta {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 8px;
        }

        .chunk-content {
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 150px;
            overflow: hidden;
        }

        .chunk-content.expanded {
            max-height: none;
        }

        .toggle-content {
            color: #667eea;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination button {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 状态消息 */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #333;
            color: white;
            border-radius: 8px;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { background: #27ae60; }
        .toast.error { background: #ff4757; }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 文档上传与解析系统</h1>
            <p>支持 PDF、Word、Excel、PowerPoint 文件上传与智能解析</p>
        </div>

        <!-- 上传卡片 -->
        <div class="card">
            <div class="card-title">上传文档</div>

            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">
                    拖拽文件到此处，或 <strong>点击选择文件</strong>
                </div>
                <div class="file-types">
                    支持格式：PDF、Word (doc/docx)、Excel (xls/xlsx)、PowerPoint (ppt/pptx)
                </div>
            </div>
            <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx">

            <div class="file-info" id="fileInfo">
                <div class="file-info-item">
                    <span class="file-info-label">文件名</span>
                    <span class="file-info-value" id="fileName">-</span>
                </div>
                <div class="file-info-item">
                    <span class="file-info-label">文件大小</span>
                    <span class="file-info-value" id="fileSize">-</span>
                </div>
                <div class="file-info-item">
                    <span class="file-info-label">文件类型</span>
                    <span class="file-info-value" id="fileType">-</span>
                </div>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">上传中...</div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button class="btn btn-primary" id="uploadBtn" disabled>
                    <span>⬆️</span> 开始上传并解析
                </button>
            </div>
        </div>

        <!-- 文档列表卡片 -->
        <div class="card">
            <div class="card-title">文档列表</div>

            <div class="filter-bar">
                <select id="brandFilter">
                    <option value="">全部品牌</option>
                </select>
                <select id="typeFilter">
                    <option value="">全部类型</option>
                    <option value="pdf">PDF</option>
                    <option value="docx">Word</option>
                    <option value="xlsx">Excel</option>
                    <option value="pptx">PowerPoint</option>
                </select>
                <button class="btn-refresh" onclick="loadDocuments()">🔄 刷新</button>
            </div>

            <div class="table-container">
                <table id="docTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>文件名</th>
                            <th>品牌</th>
                            <th>类型</th>
                            <th>切片数</th>
                            <th>上传时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="docTableBody">
                        <tr>
                            <td colspan="7" class="empty-state">
                                <div class="empty-state-icon">📭</div>
                                <div>暂无文档，上传第一个文件开始</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- 文档详情模态框 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📄 文档详情</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- Toast 消息 -->
    <div class="toast" id="toast"></div>

    <script>
        // 配置
        const API_BASE = 'http://localhost:8005';

        // 状态
        let selectedFile = null;
        let currentPage = 1;
        let totalPages = 1;
        let totalDocs = 0;

        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadBrands();
            loadDocuments();
            setupUploadArea();
        });

        // 上传区域设置
        function setupUploadArea() {
            uploadArea.addEventListener('click', () => fileInput.click());

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    handleFileSelect(e.dataTransfer.files[0]);
                }
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) {
                    handleFileSelect(fileInput.files[0]);
                }
            });
        }

        // 处理文件选择
        function handleFileSelect(file) {
            const validTypes = [
                'application/pdf',
                'application/msword',
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'application/vnd.ms-excel',
                'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                'application/vnd.ms-powerpoint',
                'application/vnd.openxmlformats-officedocument.presentationml.presentation'
            ];

            // 简单扩展名检查
            const ext = file.name.split('.').pop().toLowerCase();
            const validExts = ['pdf', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx'];

            if (!validExts.includes(ext)) {
                showToast('不支持的文件类型', 'error');
                return;
            }

            selectedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            document.getElementById('fileType').textContent = ext.toUpperCase();

            fileInfo.classList.add('show');
            uploadBtn.disabled = false;
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // 上传文件
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            uploadBtn.disabled = true;
            progressContainer.classList.add('show');
            progressFill.style.width = '0%';
            progressText.textContent = '上传中...';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                // 模拟进度
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += 5;
                    if (progress <= 90) {
                        progressFill.style.width = progress + '%';
                        progressText.textContent = `处理中... ${progress}%`;
                    }
                }, 200);

                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                clearInterval(progressInterval);
                progressFill.style.width = '100%';
                progressText.textContent = '完成！';

                const result = await response.json();

                if (result.success) {
                    showToast(`上传成功！生成 ${result.chunks} 个切片`, 'success');
                    fileInfo.classList.remove('show');
                    selectedFile = null;
                    fileInput.value = '';
                    uploadBtn.disabled = true;

                    // 刷新列表
                    loadDocuments();
                    loadBrands();
                } else {
                    showToast(result.message || '上传失败', 'error');
                }

            } catch (error) {
                showToast('上传失败: ' + error.message, 'error');
            } finally {
                setTimeout(() => {
                    progressContainer.classList.remove('show');
                    uploadBtn.disabled = false;
                }, 1500);
            }
        });

        // 加载品牌列表
        async function loadBrands() {
            try {
                const response = await fetch(`${API_BASE}/brands`);
                const result = await response.json();

                if (result.success) {
                    const select = document.getElementById('brandFilter');
                    select.innerHTML = '<option value="">全部品牌</option>';

                    result.brands.forEach(brand => {
                        const option = document.createElement('option');
                        option.value = brand;
                        option.textContent = brand;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('加载品牌失败:', error);
            }
        }

        // 加载文档列表
        async function loadDocuments(page = 1) {
            const brand = document.getElementById('brandFilter').value;
            const category = document.getElementById('typeFilter').value;

            currentPage = page;

            try {
                let url = `${API_BASE}/documents?page=${page}&page_size=10`;
                if (brand) url += `&brand=${encodeURIComponent(brand)}`;
                if (category) url += `&category=${encodeURIComponent(category)}`;

                const response = await fetch(url);
                const result = await response.json();

                if (result.success) {
                    renderDocuments(result.documents);
                    renderPagination(result.total, result.page, result.page_size);
                }
            } catch (error) {
                console.error('加载文档失败:', error);
                showToast('加载文档失败', 'error');
            }
        }

        // 渲染文档列表
        function renderDocuments(docs) {
            const tbody = document.getElementById('docTableBody');

            if (!docs || docs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div>暂无文档，上传第一个文件开始</div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = docs.map(doc => `
                <tr>
                    <td>${doc.id}</td>
                    <td>${doc.file_name}</td>
                    <td>${doc.brand || '-'}</td>
                    <td><span class="badge badge-${doc.category}">${doc.category.toUpperCase()}</span></td>
                    <td>${doc.chunk_count}</td>
                    <td>${formatDate(doc.upload_date)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-secondary btn-sm" onclick="viewDocument(${doc.id})">
                                👁️ 查看
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteDocument(${doc.id})">
                                🗑️ 删除
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        // 渲染分页
        function renderPagination(total, page, pageSize) {
            totalDocs = total;
            const totalPages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <button ${page <= 1 ? 'disabled' : ''} onclick="loadDocuments(${page - 1})">
                    ← 上一页
                </button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
                    html += `<button class="${i === page ? 'active' : ''}" onclick="loadDocuments(${i})">${i}</button>`;
                } else if (i === page - 3 || i === page + 3) {
                    html += `<span>...</span>`;
                }
            }

            html += `
                <button ${page >= totalPages ? 'disabled' : ''} onclick="loadDocuments(${page + 1})">
                    下一页 →
                </button>
            `;

            pagination.innerHTML = html;
        }

        // 查看文档详情
        async function viewDocument(docId) {
            try {
                const response = await fetch(`${API_BASE}/documents/${docId}`);
                const result = await response.json();

                if (result.success) {
                    showDocumentModal(result);
                }
            } catch (error) {
                showToast('加载文档详情失败', 'error');
            }
        }

        // 显示文档模态框
        function showDocumentModal(result) {
            const { document: doc, chunks } = result;
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');

            body.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h4 style="margin-bottom: 10px;">📄 ${doc.file_name}</h4>
                    <div style="color: #666; font-size: 0.9rem;">
                        <span>品牌: ${doc.brand || '-'}</span> |
                        <span>类型: ${doc.category.toUpperCase()}</span> |
                        <span>切片数: ${chunks.length}</span> |
                        <span>上传时间: ${formatDate(doc.upload_date)}</span>
                    </div>
                </div>

                <h5 style="margin-bottom: 15px;">📑 内容切片 (${chunks.length})</h5>

                ${chunks.map((chunk, index) => `
                    <div class="chunk-item">
                        <div class="chunk-meta">
                            切片 ${index + 1} ${chunk.brand ? `| 品牌: ${chunk.brand}` : ''}
                        </div>
                        <div class="chunk-content" id="chunk-${chunk.id}">${escapeHtml(chunk.content)}</div>
                        ${chunk.content && chunk.content.length > 300 ? `
                            <div class="toggle-content" onclick="toggleChunk(${chunk.id})">展开全部 ▼</div>
                        ` : ''}
                    </div>
                `).join('')}

                ${chunks.length === 0 ? '<div class="empty-state">暂无切片内容</div>' : ''}
            `;

            modal.classList.add('show');
        }

        // 切换切片展开/收起
        function toggleChunk(chunkId) {
            const content = document.getElementById(`chunk-${chunkId}`);
            const toggle = content.nextElementSibling;

            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                toggle.textContent = '展开全部 ▼';
            } else {
                content.classList.add('expanded');
                toggle.textContent = '收起 ▲';
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // 删除文档
        async function deleteDocument(docId) {
            if (!confirm('确定要删除这个文档吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/documents/${docId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.success) {
                    showToast('文档已删除', 'success');
                    loadDocuments(currentPage);
                    loadBrands();
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        // Toast 消息
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 点击模态框外部关闭
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                closeModal();
            }
        });

        // 筛选变化时重新加载
        document.getElementById('brandFilter').addEventListener('change', () => loadDocuments(1));
        document.getElementById('typeFilter').addEventListener('change', () => loadDocuments(1));
    </script>
</body>
</html>
