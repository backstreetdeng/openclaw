<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>汽车市场战略智能体</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #17202a;
      --muted: #667085;
      --line: #d9e0e8;
      --primary: #0f5aa6;
      --primary-soft: #e8f1fb;
      --green: #087f5b;
      --amber: #b76e00;
      --red: #c92a2a;
      --shadow: 0 10px 28px rgba(15, 35, 60, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.55;
    }

    button, textarea, input, select { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 300px minmax(0, 1fr); }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand { display: flex; align-items: center; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
    .brand-mark {
      width: 40px; height: 40px; border-radius: 8px;
      display: grid; place-items: center;
      background: var(--primary); color: white; font-weight: 700;
    }
    .brand-title { font-weight: 700; color: var(--text); }
    .brand-sub { font-size: 12px; color: var(--muted); }

    .status-card {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 8px;
      font-size: 13px;
    }
    .status-row { display: flex; justify-content: space-between; gap: 10px; }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--line); display: inline-block; margin-right: 7px; }
    .status-dot.ok { background: var(--green); }
    .status-dot.run { background: var(--amber); animation: pulse 1.3s infinite; }
    .status-dot.bad { background: var(--red); }
    @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .45; transform: scale(1.35); } }

    .quick-title { margin-top: 6px; font-size: 12px; color: var(--muted); font-weight: 700; }
    .quick-list { display: grid; gap: 8px; }
    .quick {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      text-align: left;
      border-radius: 8px;
      padding: 10px 12px;
      transition: border-color .15s, background .15s;
    }
    .quick:hover { border-color: var(--primary); background: var(--primary-soft); }

    .history { flex: 1; min-height: 0; overflow: auto; border-top: 1px solid var(--line); padding-top: 12px; }
    .history-item {
      border-radius: 8px;
      padding: 9px 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .history-item:hover { background: var(--panel-soft); color: var(--text); }

    .main { display: grid; grid-template-rows: auto minmax(0, 1fr) auto; min-width: 0; }
    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .topbar h1 { font-size: 18px; margin: 0; }
    .topbar p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .top-actions { display: flex; gap: 8px; }

    .btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 8px;
      min-height: 38px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .btn.primary { border-color: var(--primary); background: var(--primary); color: white; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .messages {
      padding: 24px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 18px;
    }
    .message { max-width: 1180px; width: 100%; margin: 0 auto; display: grid; grid-template-columns: 38px minmax(0, 1fr); gap: 12px; }
    .message.user { grid-template-columns: minmax(0, 1fr) 38px; }
    .message.user .avatar { grid-column: 2; }
    .message.user .bubble { grid-column: 1; grid-row: 1; justify-self: end; max-width: 760px; background: var(--primary); color: white; border-color: var(--primary); }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: grid; place-items: center;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
      flex: 0 0 auto;
    }
    .message.user .avatar { background: var(--primary); color: white; }
    .bubble {
      border: 1px solid var(--line);
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 1px 2px rgba(15,35,60,.04);
      min-width: 0;
    }

    .welcome {
      max-width: 720px;
      margin: 72px auto;
      text-align: center;
      color: var(--muted);
    }
    .welcome strong { display: block; color: var(--text); font-size: 24px; margin-bottom: 8px; }

    .thinking-grid {
      display: grid;
      grid-template-columns: minmax(260px, .42fr) minmax(0, .58fr);
      gap: 14px;
    }
    .run-panel {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      border-radius: 10px;
      padding: 12px;
      min-width: 0;
    }
    .run-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 10px;
    }
    .run-sub { font-size: 12px; color: var(--muted); font-weight: 500; }
    .timeline { display: grid; gap: 8px; max-height: 420px; overflow: auto; padding-right: 4px; }
    .event {
      border: 1px solid var(--line);
      border-left: 4px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 9px 10px;
      display: grid;
      gap: 4px;
    }
    .event.running { border-left-color: var(--primary); }
    .event.done { border-left-color: var(--green); }
    .event.warning { border-left-color: var(--amber); }
    .event.error { border-left-color: var(--red); }
    .event-top { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--muted); }
    .event-phase { color: var(--primary); font-weight: 700; }
    .event-summary { font-size: 13px; color: var(--text); word-break: break-word; }

    .thought-stream {
      max-height: 420px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f1720;
      color: #d8e4f0;
      padding: 12px;
      font-family: Consolas, "SFMono-Regular", "Microsoft YaHei Mono", monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .cursor {
      display: inline-block;
      width: 7px;
      height: 14px;
      background: #8bc4ff;
      margin-left: 3px;
      vertical-align: -2px;
      animation: blink .8s infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin: 14px 0; }
    .metric { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    .metric-label { color: var(--muted); font-size: 12px; }
    .metric-value { margin-top: 4px; color: var(--primary); font-size: 20px; font-weight: 800; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin: 10px 0; }
    .chip { border: 1px solid #b9d4ef; background: var(--primary-soft); color: var(--primary); border-radius: 999px; padding: 4px 9px; font-size: 12px; }
    .chip.warn { border-color: #e5c17a; background: #fff6df; color: var(--amber); }

    .report {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      padding-top: 12px;
      color: var(--text);
    }
    .report h1 { font-size: 22px; margin: 16px 0 10px; }
    .report h2 { font-size: 17px; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--line); }
    .report h3 { font-size: 15px; margin: 12px 0 6px; }
    .report p { margin: 8px 0; }
    .report ul { margin: 8px 0 10px 22px; padding: 0; }
    .report li { margin: 5px 0; }
    .report strong { color: var(--primary); }
    .report code { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 4px; padding: 1px 5px; }

    .input-area {
      background: var(--panel);
      border-top: 1px solid var(--line);
      padding: 14px 24px 18px;
    }
    .composer {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }
    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 150px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      outline: none;
      background: var(--panel-soft);
    }
    textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,90,166,.09); }
    .composer-options { max-width: 1180px; margin: 8px auto 0; display: flex; gap: 8px; align-items: center; color: var(--muted); font-size: 13px; }
    .composer-options input, .composer-options select { height: 34px; border: 1px solid var(--line); border-radius: 7px; padding: 0 9px; background: white; }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .thinking-grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">AI</div>
        <div>
          <div class="brand-title">汽车市场战略智能体</div>
          <div class="brand-sub">ReAct 透明执行流</div>
        </div>
      </div>

      <div class="status-card">
        <div class="status-row"><span><span id="statusDot" class="status-dot"></span>服务状态</span><strong id="statusText">检测中</strong></div>
        <div class="status-row"><span>Documents</span><strong id="dbDocs">-</strong></div>
        <div class="status-row"><span>Chunks</span><strong id="dbChunks">-</strong></div>
      </div>

      <div class="quick-title">快捷问题</div>
      <div class="quick-list">
        <button class="quick" data-q="分析比亚迪最近12个月市场策略">比亚迪最近12个月市场策略</button>
        <button class="quick" data-q="分析 2026 年中国新能源乘用车市场竞争格局">2026年新能源乘用车竞争格局</button>
        <button class="quick" data-q="评估15-20万新能源SUV市场机会">15-20万新能源SUV市场机会</button>
        <button class="quick" data-q="对比比亚迪、特斯拉、吉利进行竞品分析">比亚迪、特斯拉、吉利竞品对比</button>
      </div>

      <div class="quick-title">历史对话</div>
      <div class="history" id="history"></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>市场分析对话</h1>
          <p>实时显示 strategy-orchestrator 的 Plan / Act / Observe / Reflect / Re-plan。</p>
        </div>
        <div class="top-actions">
          <button class="btn" id="healthBtn">刷新状态</button>
          <button class="btn" id="clearBtn">清空</button>
          <button class="btn" id="exportBtn">导出</button>
        </div>
      </header>

      <section class="messages" id="messages">
        <div class="welcome" id="welcome">
          <strong>把 agent 的思考过程展示出来</strong>
          <div>发送一个市场分析问题后，这里会实时输出编排计划、工具调用、证据入账、反思缺口、重规划和最终报告。</div>
        </div>
      </section>

      <footer class="input-area">
        <div class="composer">
          <textarea id="input" placeholder="输入市场分析问题，Ctrl+Enter 发送"></textarea>
          <button class="btn primary" id="sendBtn">发送</button>
        </div>
        <div class="composer-options">
          <span>类型</span>
          <select id="analysisType">
            <option value="">自动识别</option>
            <option value="competitor">竞品分析</option>
            <option value="policy">政策影响</option>
            <option value="opportunity">机会评估</option>
            <option value="market">市场趋势</option>
            <option value="comprehensive">综合研究</option>
            <option value="business_analysis">商业模式分析</option>
          </select>
          <span>时间</span>
          <input id="timeRange" type="text" placeholder="可留空，如 2026年 / 最近6个月">
        </div>
      </footer>
    </main>
  </div>

  <script>
    const API_BASE = "";
    const CHAT_HISTORY_STORAGE = "marketChatHistory";
    const WEB_SESSION_STORAGE = "marketWebSessionId";
    const newSessionId = () => {
      if (window.crypto?.randomUUID) return "web_" + window.crypto.randomUUID();
      return "web_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
    };
    const loadSessionId = () => {
      let id = localStorage.getItem(WEB_SESSION_STORAGE);
      if (!id) {
        id = newSessionId();
        localStorage.setItem(WEB_SESSION_STORAGE, id);
      }
      return id;
    };
    const state = {
      chats: JSON.parse(localStorage.getItem(CHAT_HISTORY_STORAGE) || "[]"),
      currentId: loadSessionId(),
      running: false,
      abortController: null,
      activeRun: null,
    };

    const $ = (id) => document.getElementById(id);
    const fmtTime = (ts = Date.now()) => new Date(ts).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    function persistCurrentSession() {
      if (state.currentId) localStorage.setItem(WEB_SESSION_STORAGE, state.currentId);
    }

    function saveHistory() {
      persistCurrentSession();
      localStorage.setItem(CHAT_HISTORY_STORAGE, JSON.stringify(state.chats.slice(0, 40)));
      renderHistory();
    }

    function renderHistory() {
      $("history").innerHTML = state.chats.length
        ? state.chats.map(chat => `<div class="history-item" data-id="${chat.id}">${escapeHtml(chat.title)}</div>`).join("")
        : `<div class="history-item">暂无历史</div>`;
      document.querySelectorAll(".history-item[data-id]").forEach(item => {
        item.addEventListener("click", () => loadChat(item.dataset.id));
      });
    }

    function currentChat() {
      let chat = state.chats.find(item => item.id === state.currentId);
      if (!chat) {
        chat = { id: state.currentId || newSessionId(), title: "新对话", messages: [], updatedAt: Date.now() };
        state.currentId = chat.id;
        persistCurrentSession();
        state.chats.unshift(chat);
      }
      return chat;
    }

    function loadChat(id) {
      const chat = state.chats.find(item => item.id === id);
      if (!chat || state.running) return;
      state.currentId = id;
      persistCurrentSession();
      $("welcome").style.display = "none";
      renderMessages(chat.messages);
    }

    function renderMessages(messages) {
      $("messages").innerHTML = messages.map(msg => {
        const role = msg.role === "user" ? "user" : "assistant";
        return `<div class="message ${role}">
          <div class="avatar">${role === "user" ? "你" : "AI"}</div>
          <div class="bubble">${formatContent(msg.content)}</div>
        </div>`;
      }).join("");
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function formatContent(content) {
      let html = markdownToHtml(content || "");
      return html || "";
    }

    function markdownToHtml(markdown) {
      const lines = escapeHtml(markdown).split(/\r?\n/);
      let html = "";
      let inList = false;
      for (const raw of lines) {
        const line = raw.trimEnd();
        if (!line.trim()) {
          if (inList) { html += "</ul>"; inList = false; }
          continue;
        }
        const strong = (s) => s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/`([^`]+)`/g, "<code>$1</code>");
        if (line.startsWith("# ")) {
          if (inList) { html += "</ul>"; inList = false; }
          html += `<h1>${strong(line.slice(2))}</h1>`;
        } else if (line.startsWith("## ")) {
          if (inList) { html += "</ul>"; inList = false; }
          html += `<h2>${strong(line.slice(3))}</h2>`;
        } else if (line.startsWith("### ")) {
          if (inList) { html += "</ul>"; inList = false; }
          html += `<h3>${strong(line.slice(4))}</h3>`;
        } else if (line.startsWith("- ")) {
          if (!inList) { html += "<ul>"; inList = true; }
          html += `<li>${strong(line.slice(2))}</li>`;
        } else {
          if (inList) { html += "</ul>"; inList = false; }
          html += `<p>${strong(line)}</p>`;
        }
      }
      if (inList) html += "</ul>";
      return html;
    }

    function createAssistantRun() {
      const runId = "run_" + Date.now();
      const wrapper = document.createElement("div");
      wrapper.className = "message assistant";
      wrapper.id = runId;
      wrapper.innerHTML = `
        <div class="avatar">AI</div>
        <div class="bubble">
          <div class="thinking-grid">
            <div class="run-panel">
              <div class="run-title">
                <span>执行时间线</span>
                <span class="run-sub" id="${runId}_count">0 条事件</span>
              </div>
              <div class="timeline" id="${runId}_timeline"></div>
            </div>
            <div class="run-panel">
              <div class="run-title">
                <span>实时思考流</span>
                <span class="run-sub" id="${runId}_elapsed">0s</span>
              </div>
              <div class="thought-stream" id="${runId}_stream"><span class="cursor"></span></div>
            </div>
          </div>
          <div class="metrics" id="${runId}_metrics" style="display:none"></div>
          <div class="chips" id="${runId}_sources"></div>
          <div class="chips" id="${runId}_warnings"></div>
          <div class="report" id="${runId}_report"></div>
        </div>`;
      $("messages").appendChild(wrapper);
      $("messages").scrollTop = $("messages").scrollHeight;
      state.activeRun = { id: runId, startedAt: Date.now(), eventCount: 0, thoughtText: "" };
      appendRunEvent({ phase: "Start", stage: "stage1", status: "running", summary: "已建立 SSE 连接，等待后端真实执行事件。" });
      return runId;
    }

    function appendRunEvent(event) {
      const run = state.activeRun;
      if (!run) return;
      run.eventCount += 1;
      const status = event.status || "running";
      const time = event.timestamp ? new Date(event.timestamp).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : fmtTime();
      const timeline = $(run.id + "_timeline");
      const phase = event.phase || event.stage_name || event.stage || "Event";
      const summary = event.summary || event.status || "";
      timeline.insertAdjacentHTML("beforeend", `
        <div class="event ${escapeHtml(status)}">
          <div class="event-top">
            <span class="event-phase">${escapeHtml(phase)}</span>
            <span>${escapeHtml(time)}</span>
          </div>
          <div class="event-summary">${escapeHtml(summary)}</div>
        </div>`);
      timeline.scrollTop = timeline.scrollHeight;

      const line = `[${time}] ${phase} | ${status}\n${summary}\n`;
      run.thoughtText += (run.thoughtText ? "\n" : "") + line;
      const stream = $(run.id + "_stream");
      stream.innerHTML = escapeHtml(run.thoughtText) + `<span class="cursor"></span>`;
      stream.scrollTop = stream.scrollHeight;

      $(run.id + "_count").textContent = `${run.eventCount} 条事件`;
      $(run.id + "_elapsed").textContent = `${Math.round((Date.now() - run.startedAt) / 1000)}s`;
      $("messages").scrollTop = $("messages").scrollHeight;
    }

    function renderComplete(data) {
      const run = state.activeRun;
      if (!run) return;
      const confidence = Number(data.confidence || 0);
      const metrics = $(run.id + "_metrics");
      metrics.style.display = "grid";
      metrics.innerHTML = `
        <div class="metric"><div class="metric-label">置信度</div><div class="metric-value">${Math.round(confidence * 100)}%</div></div>
        <div class="metric"><div class="metric-label">质量门禁</div><div class="metric-value">${data.quality_passed ? "通过" : "未过"}</div></div>
        <div class="metric"><div class="metric-label">证据数</div><div class="metric-value">${data.evidence_count ?? "-"}</div></div>
        <div class="metric"><div class="metric-label">耗时</div><div class="metric-value">${data.execution_time ? data.execution_time + "s" : "-"}</div></div>`;
      $(run.id + "_sources").innerHTML = (data.sources || []).map(item => `<span class="chip">${escapeHtml(item)}</span>`).join("");
      $(run.id + "_warnings").innerHTML = (data.missing_or_uncertain || []).map(item => `<span class="chip warn">${escapeHtml(item)}</span>`).join("");
      $(run.id + "_report").innerHTML = markdownToHtml(data.report || data.answer || "未返回报告内容。");
      appendRunEvent({ phase: "Complete", status: data.success ? "done" : "warning", summary: `最终结果已返回：confidence=${confidence.toFixed(3)}，quality_passed=${data.quality_passed}` });
    }

    function parseSseFrames(buffer) {
      buffer = buffer.replace(/\r\n/g, "\n");
      const parts = buffer.split("\n\n");
      return { frames: parts.slice(0, -1), rest: parts[parts.length - 1] || "" };
    }

    function parseFrame(frame) {
      const eventLine = frame.split("\n").find(line => line.startsWith("event:"));
      const dataLines = frame.split("\n").filter(line => line.startsWith("data:"));
      if (!eventLine || !dataLines.length) return null;
      const event = eventLine.slice(6).trim();
      const dataText = dataLines.map(line => line.slice(5).trim()).join("\n");
      return { event, data: JSON.parse(dataText) };
    }

    async function sendMessage() {
      const question = $("input").value.trim();
      if (!question || state.running) return;

      const chat = currentChat();
      chat.title = question.slice(0, 36);
      chat.updatedAt = Date.now();
      chat.messages.push({ role: "user", content: question, timestamp: Date.now() });
      saveHistory();

      $("welcome")?.remove();
      renderMessages(chat.messages);
      const runId = createAssistantRun();
      $("input").value = "";
      $("input").style.height = "auto";
      state.running = true;
      state.abortController = new AbortController();
      $("sendBtn").textContent = "停止";
      $("sendBtn").classList.remove("primary");
      setStatus("run", "分析中");

      let finalText = "";
      try {
        const response = await fetch(API_BASE + "/analyze_sse", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question,
            analysis_type: $("analysisType").value || null,
            time_range: $("timeRange").value || null,
            max_cycles: 3,
            session_id: chat.id,
          }),
          signal: state.abortController.signal,
        });
        if (!response.ok || !response.body) throw new Error(`HTTP ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parsed = parseSseFrames(buffer);
          buffer = parsed.rest;
          for (const frame of parsed.frames) {
            const item = parseFrame(frame);
            if (!item) continue;
            if (item.event === "progress" || item.event === "react") {
              appendRunEvent(item.data);
            } else if (item.event === "complete") {
              renderComplete(item.data);
              finalText = item.data.report || item.data.answer || "";
            } else if (item.event === "error") {
              throw new Error(item.data.error || item.data.error_type || "后端返回错误");
            }
          }
        }
        chat.messages.push({ role: "assistant", content: finalText || collectRunText(runId), timestamp: Date.now() });
        setStatus("ok", "完成");
      } catch (err) {
        const message = err.name === "AbortError" ? "用户已停止生成。" : "分析失败：" + err.message;
        appendRunEvent({ phase: "Error", status: "error", summary: message });
        chat.messages.push({ role: "assistant", content: message + "\n\n" + collectRunText(runId), timestamp: Date.now() });
        setStatus("bad", err.name === "AbortError" ? "已停止" : "失败");
      } finally {
        state.running = false;
        state.abortController = null;
        state.activeRun = null;
        $("sendBtn").textContent = "发送";
        $("sendBtn").classList.add("primary");
        saveHistory();
      }
    }

    function collectRunText(runId) {
      const stream = $(runId + "_stream");
      const report = $(runId + "_report");
      return [stream?.textContent || "", report?.innerText || ""].filter(Boolean).join("\n\n");
    }

    function stopOrSend() {
      if (state.running && state.abortController) {
        state.abortController.abort();
        return;
      }
      sendMessage();
    }

    function setStatus(kind, text) {
      $("statusDot").className = "status-dot " + (kind || "");
      $("statusText").textContent = text;
    }

    async function refreshHealth() {
      try {
        const response = await fetch(API_BASE + "/health");
        const data = await response.json();
        const db = data.db || {};
        setStatus(db.connected ? "ok" : "bad", db.connected ? "正常" : "异常");
        $("dbDocs").textContent = db.documents ?? "-";
        $("dbChunks").textContent = db.chunks ?? "-";
      } catch {
        setStatus("bad", "离线");
      }
    }

    function clearChat() {
      if (state.running) return;
      state.currentId = newSessionId();
      persistCurrentSession();
      $("messages").innerHTML = `<div class="welcome" id="welcome"><strong>把 agent 的思考过程展示出来</strong><div>发送一个市场分析问题后，这里会实时输出编排计划、工具调用、证据入账、反思缺口、重规划和最终报告。</div></div>`;
    }

    function exportChat() {
      const chat = state.chats.find(item => item.id === state.currentId);
      if (!chat) return;
      const content = chat.messages.map(msg => `## ${msg.role === "user" ? "用户" : "智能体"}\n\n${msg.content}`).join("\n\n---\n\n");
      const blob = new Blob([`# ${chat.title}\n\n${content}`], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `market_chat_${Date.now()}.md`;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll(".quick").forEach(btn => {
      btn.addEventListener("click", () => {
        $("input").value = btn.dataset.q;
        $("input").focus();
      });
    });
    $("sendBtn").addEventListener("click", stopOrSend);
    $("healthBtn").addEventListener("click", refreshHealth);
    $("clearBtn").addEventListener("click", clearChat);
    $("exportBtn").addEventListener("click", exportChat);
    $("input").addEventListener("input", function () {
      this.style.height = "auto";
      this.style.height = Math.min(this.scrollHeight, 150) + "px";
    });
    $("input").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        sendMessage();
      }
    });

    renderHistory();
    refreshHealth();
  </script>
</body>
</html>
