<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档管理中心</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.0.3/src/regular/style.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .drop-zone {
            border: 2px dashed #d1d5db;
            transition: all 0.3s ease;
        }

        .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        .progress-bar {
            transition: width 0.3s ease;
        }

        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
        }

        .file-item:hover {
            background-color: #f9fafb;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 900px;
            width: 90%;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .markdown-preview {
            font-size: 14px;
            line-height: 1.6;
            overflow-y: auto;
            padding: 20px;
            flex: 1;
        }

        .markdown-preview h1 { font-size: 1.5em; font-weight: bold; margin: 1em 0 0.5em; }
        .markdown-preview h2 { font-size: 1.25em; font-weight: bold; margin: 1em 0 0.5em; }
        .markdown-preview h3 { font-size: 1.1em; font-weight: bold; margin: 0.8em 0 0.4em; }
        .markdown-preview p { margin: 0.5em 0; }
        .markdown-preview code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; }
        .markdown-preview pre { background: #f1f5f9; padding: 12px; border-radius: 8px; overflow-x: auto; }
        .markdown-preview table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        .markdown-preview th, .markdown-preview td { border: 1px solid #e5e7eb; padding: 8px 12px; }
        .markdown-preview th { background: #f9fafb; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i class="ph ph-files text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-semibold text-gray-900">文档管理中心</h1>
                        <p class="text-sm text-gray-500">MinerU 文档解析 + 向量数据库</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="showUploadModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition">
                        <i class="ph ph-upload-simple"></i>
                        上传文档
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Tabs -->
    <div class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex gap-8">
                <button onclick="switchTab('documents')" id="tab-documents" class="py-4 px-2 text-sm font-medium tab-active">
                    <i class="ph ph-files mr-2"></i>文档列表
                </button>
                <button onclick="switchTab('upload')" id="tab-upload" class="py-4 px-2 text-sm font-medium text-gray-500 hover:text-gray-700">
                    <i class="ph ph-upload mr-2"></i>上传记录
                </button>
                <button onclick="switchTab('search')" id="tab-search" class="py-4 px-2 text-sm font-medium text-gray-500 hover:text-gray-700">
                    <i class="ph ph-magnifying-glass mr-2"></i>内容检索
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- Stats -->
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                        <i class="ph ph-file-text text-blue-600"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-gray-900" id="stat-docs">-</p>
                        <p class="text-sm text-gray-500">文档总数</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center">
                        <i class="ph ph-stack text-green-600"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-gray-900" id="stat-chunks">-</p>
                        <p class="text-sm text-gray-500">切片总数</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center">
                        <i class="ph ph-database text-purple-600"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-gray-900">PGVector</p>
                        <p class="text-sm text-gray-500">向量数据库</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-orange-100 rounded-lg flex items-center justify-center">
                        <i class="ph ph-robot text-orange-600"></i>
                    </div>
                    <div>
                        <p class="text-2xl font-bold text-gray-900">MinerU 3.1</p>
                        <p class="text-sm text-gray-500">智能解析引擎</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Document List -->
        <div id="section-documents" class="bg-white rounded-xl shadow-sm border border-gray-100">
            <div class="p-4 border-b border-gray-100">
                <div class="flex items-center justify-between">
                    <h2 class="text-lg font-semibold text-gray-900">文档列表</h2>
                    <button onclick="loadDocuments()" class="text-blue-600 hover:text-blue-700 text-sm">
                        <i class="ph ph-arrows-clockwise mr-1"></i>刷新
                    </button>
                </div>
            </div>
            <div id="document-list" class="divide-y divide-gray-100">
                <div class="p-8 text-center text-gray-500">
                    <i class="ph ph-spinner text-3xl animate-spin"></i>
                    <p class="mt-2">加载中...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div id="upload-modal" class="modal">
        <div class="modal-content">
            <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                <h3 class="text-lg font-semibold">上传文档</h3>
                <button onclick="closeUploadModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <!-- Drop Zone -->
                <div id="drop-zone" class="drop-zone rounded-xl p-8 text-center cursor-pointer"
                     onclick="document.getElementById('file-input').click()">
                    <i class="ph ph-cloud-arrow-up text-5xl text-gray-400 mb-4"></i>
                    <p class="text-gray-600 mb-2">拖拽文件到此处，或点击选择文件</p>
                    <p class="text-sm text-gray-400">支持 PDF, DOCX, PPTX, XLSX 格式</p>
                    <input type="file" id="file-input" class="hidden" accept=".pdf,.docx,.doc,.pptx,.ppt,.xlsx,.xls"
                           onchange="handleFileSelect(this.files[0])">
                </div>

                <!-- Selected File -->
                <div id="selected-file" class="hidden mt-4 p-4 bg-gray-50 rounded-lg">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center">
                            <i class="ph ph-file-text text-blue-600"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-medium text-gray-900" id="selected-filename">-</p>
                            <p class="text-sm text-gray-500" id="selected-filesize">-</p>
                        </div>
                        <button onclick="clearFile()" class="text-gray-400 hover:text-red-500">
                            <i class="ph ph-x-circle text-xl"></i>
                        </button>
                    </div>
                </div>

                <!-- Form Fields -->
                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">品牌</label>
                        <input type="text" id="upload-brand" placeholder="如：比亚迪、吉利"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">车型</label>
                        <input type="text" id="upload-car-model" placeholder="如：汉EV、唐DM"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
                        <select id="upload-category" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="">请选择</option>
                            <option value="产品手册">产品手册</option>
                            <option value="技术资料">技术资料</option>
                            <option value="市场报告">市场报告</option>
                            <option value="政策文件">政策文件</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">发布日期</label>
                        <input type="date" id="upload-publish-date"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">来源</label>
                    <input type="text" id="upload-source" placeholder="如：官网、经销商、公开资料"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- Progress -->
                <div id="upload-progress" class="hidden mt-6">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-600" id="progress-status">上传中...</span>
                        <span class="text-sm text-gray-600" id="progress-percent">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div id="progress-bar" class="progress-bar bg-blue-600 h-2 rounded-full" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Result -->
                <div id="upload-result" class="hidden mt-6 p-4 rounded-lg">
                </div>
            </div>
            <div class="p-4 border-t border-gray-200 flex justify-end gap-3">
                <button onclick="closeUploadModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">
                    取消
                </button>
                <button onclick="uploadFile()" id="upload-btn" disabled
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed">
                    <i class="ph ph-upload-simple mr-2"></i>开始上传
                </button>
            </div>
        </div>
    </div>

    <!-- Document Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="p-4 border-b border-gray-200 flex items-center justify-between">
                <h3 class="text-lg font-semibold" id="detail-title">文档详情</h3>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-4 border-b border-gray-200 bg-gray-50">
                <div class="flex items-center gap-4 text-sm text-gray-600">
                    <span><i class="ph ph-file-text mr-1"></i><span id="detail-filename">-</span></span>
                    <span><i class="ph ph-tag mr-1"></i><span id="detail-brand">-</span></span>
                    <span><i class="ph ph-clock mr-1"></i><span id="detail-date">-</span></span>
                    <span><i class="ph ph-stack mr-1"></i><span id="detail-chunks">0</span> 个切片</span>
                </div>
            </div>
            <div class="markdown-preview bg-white" id="detail-content">
                <div class="p-8 text-center text-gray-500">
                    <i class="ph ph-spinner text-3xl animate-spin"></i>
                    <p class="mt-2">加载中...</p>
                </div>
            </div>
            <div class="p-4 border-t border-gray-200 flex justify-end">
                <button onclick="closeDetailModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200">
                    关闭
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8001';

        let currentTab = 'documents';
        let selectedFile = null;
        let documents = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadDocuments();
            setupDropZone();
        });

        // Tab switching
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.classList.remove('tab-active');
                el.classList.add('text-gray-500');
            });
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            document.getElementById(`tab-${tab}`).classList.remove('text-gray-500');

            // Show/hide sections
            document.getElementById('section-documents').classList.toggle('hidden', tab !== 'documents');
        }

        // Stats
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/stats`);
                const data = await res.json();
                document.getElementById('stat-docs').textContent = data.total_documents || 0;
                document.getElementById('stat-chunks').textContent = data.total_chunks || 0;
            } catch (e) {
                console.error('Load stats error:', e);
            }
        }

        // Load documents
        async function loadDocuments() {
            const container = document.getElementById('document-list');
            container.innerHTML = `
                <div class="p-8 text-center text-gray-500">
                    <i class="ph ph-spinner text-3xl animate-spin"></i>
                    <p class="mt-2">加载中...</p>
                </div>
            `;

            try {
                const res = await fetch(`${API_BASE}/documents?limit=50`);
                documents = await res.json();
                renderDocuments();
            } catch (e) {
                container.innerHTML = `
                    <div class="p-8 text-center text-red-500">
                        <i class="ph ph-warning-circle text-3xl"></i>
                        <p class="mt-2">加载失败: ${e.message}</p>
                    </div>
                `;
            }
        }

        function renderDocuments() {
            const container = document.getElementById('document-list');

            if (documents.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center text-gray-500">
                        <i class="ph ph-files text-3xl"></i>
                        <p class="mt-2">暂无文档，上传第一个文档开始分析</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = documents.map(doc => `
                <div class="file-item p-4 hover:bg-gray-50 cursor-pointer transition"
                     onclick="showDocumentDetail(${doc.id})">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0">
                            <i class="ph ph-file-text text-blue-600 text-xl"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-gray-900 truncate">${doc.file_name}</p>
                            <div class="flex items-center gap-4 text-sm text-gray-500 mt-1">
                                ${doc.brand ? `<span class="px-2 py-0.5 bg-gray-100 rounded">${doc.brand}</span>` : ''}
                                ${doc.category ? `<span>${doc.category}</span>` : ''}
                                <span>${doc.chunks_count} 切片</span>
                                <span>${formatDate(doc.upload_date)}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="event.stopPropagation(); showDocumentDetail(${doc.id})"
                                    class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
                                <i class="ph ph-eye"></i>
                            </button>
                            <button onclick="event.stopPropagation(); deleteDocument(${doc.id})"
                                    class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
                                <i class="ph ph-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Document detail
        async function showDocumentDetail(docId) {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('show');

            try {
                // 获取文档信息
                const res = await fetch(`${API_BASE}/documents/${docId}`);
                const doc = await res.json();

                document.getElementById('detail-title').textContent = doc.file_name;
                document.getElementById('detail-filename').textContent = doc.file_name;
                document.getElementById('detail-brand').textContent = doc.brand || '未分类';
                document.getElementById('detail-date').textContent = formatDate(doc.upload_date);
                document.getElementById('detail-chunks').textContent = doc.chunks_count || 0;

                // 获取内容
                const contentRes = await fetch(`${API_BASE}/documents/${docId}/content`);
                const contentData = await contentRes.json();

                const contentEl = document.getElementById('detail-content');
                if (contentData.content) {
                    contentEl.innerHTML = marked.parse(contentData.content);
                } else {
                    contentEl.innerHTML = '<div class="p-8 text-center text-gray-500">暂无内容</div>';
                }
            } catch (e) {
                document.getElementById('detail-content').innerHTML = `
                    <div class="p-8 text-center text-red-500">
                        <i class="ph ph-warning-circle text-3xl"></i>
                        <p class="mt-2">加载失败: ${e.message}</p>
                    </div>
                `;
            }
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.remove('show');
        }

        // Delete document
        async function deleteDocument(docId) {
            if (!confirm('确定要删除这个文档吗？')) return;

            try {
                await fetch(`${API_BASE}/documents/${docId}`, { method: 'DELETE' });
                loadDocuments();
                loadStats();
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        // Upload modal
        function showUploadModal() {
            document.getElementById('upload-modal').classList.add('show');
            clearFile();
        }

        function closeUploadModal() {
            document.getElementById('upload-modal').classList.remove('show');
            // 清除表单字段
            document.getElementById('upload-brand').value = '';
            document.getElementById('upload-car-model').value = '';
            document.getElementById('upload-category').value = '';
            document.getElementById('upload-source').value = '';
            document.getElementById('upload-publish-date').value = '';
            selectedFile = null;
            document.getElementById('selected-filename').textContent = '-';
            document.getElementById('selected-filesize').textContent = '-';
        }

        // Drop zone
        function setupDropZone() {
            const dropZone = document.getElementById('drop-zone');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    dropZone.classList.add('dragover');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    dropZone.classList.remove('dragover');
                }, false);
            });

            dropZone.addEventListener('drop', (e) => {
                const file = e.dataTransfer.files[0];
                if (file) handleFileSelect(file);
            }, false);
        }

        function handleFileSelect(file) {
            if (!file) return;

            const allowedTypes = [
                'application/pdf',
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'application/msword',
                'application/vnd.openxmlformats-officedocument.presentationml.presentation',
                'application/vnd.ms-powerpoint',
                'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                'application/vnd.ms-excel'
            ];

            if (!allowedTypes.includes(file.type) && !file.name.match(/\.(pdf|docx?|pptx?|xlsx?)$/i)) {
                alert('不支持的文件格式');
                return;
            }

            selectedFile = file;
            document.getElementById('selected-filename').textContent = file.name;
            document.getElementById('selected-filesize').textContent = formatFileSize(file.size);
            document.getElementById('selected-file').classList.remove('hidden');
            document.getElementById('upload-btn').disabled = false;
            document.getElementById('upload-result').classList.add('hidden');
        }

        function clearFile() {
            selectedFile = null;
            document.getElementById('selected-file').classList.add('hidden');
            document.getElementById('file-input').value = '';
            document.getElementById('upload-btn').disabled = true;
            document.getElementById('upload-progress').classList.add('hidden');
            document.getElementById('upload-result').classList.add('hidden');
        }

        async function uploadFile() {
            if (!selectedFile) return;

            const btn = document.getElementById('upload-btn');
            const progress = document.getElementById('upload-progress');
            const result = document.getElementById('upload-result');
            const progressBar = document.getElementById('progress-bar');
            const progressStatus = document.getElementById('progress-status');
            const progressPercent = document.getElementById('progress-percent');

            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner animate-spin mr-2"></i>处理中...';
            progress.classList.remove('hidden');
            result.classList.add('hidden');

            // 模拟进度
            let percent = 0;
            const interval = setInterval(() => {
                percent = Math.min(percent + 10, 90);
                progressBar.style.width = percent + '%';
                progressPercent.textContent = percent + '%';
                if (percent < 50) {
                    progressStatus.textContent = '上传文件...';
                } else if (percent < 80) {
                    progressStatus.textContent = 'MinerU解析中...';
                } else {
                    progressStatus.textContent = '向量化存储...';
                }
            }, 300);

            try {
                const formData = new FormData();
                formData.append('file', selectedFile);
                formData.append('brand', document.getElementById('upload-brand').value);
                formData.append('category', document.getElementById('upload-category').value);
                formData.append('source', document.getElementById('upload-source').value);
                formData.append('car_model', document.getElementById('upload-car-model').value);
                formData.append('publish_date', document.getElementById('upload-publish-date').value);

                const res = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                clearInterval(interval);
                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';
                progressStatus.textContent = '完成';

                if (data.success) {
                    result.className = 'mt-6 p-4 rounded-lg bg-green-50 text-green-700';
                    result.innerHTML = `
                        <div class="flex items-center gap-2 mb-2">
                            <i class="ph ph-check-circle text-xl"></i>
                            <span class="font-medium">上传成功</span>
                        </div>
                        <p class="text-sm">文档: ${data.file_name}</p>
                        <p class="text-sm">生成切片: ${data.chunks_count} 个</p>
                        <p class="text-sm text-green-600 mt-2">文档已解析并存储到向量数据库</p>
                    `;
                    loadDocuments();
                    loadStats();
                } else {
                    throw new Error(data.error || '上传失败');
                }
            } catch (e) {
                clearInterval(interval);
                result.className = 'mt-6 p-4 rounded-lg bg-red-50 text-red-700';
                result.innerHTML = `
                    <div class="flex items-center gap-2 mb-2">
                        <i class="ph ph-x-circle text-xl"></i>
                        <span class="font-medium">上传失败</span>
                    </div>
                    <p class="text-sm">${e.message}</p>
                `;
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="ph ph-upload-simple mr-2"></i>开始上传';
        }

        // Utility
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('zh-CN');
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Simple markdown parser
        const marked = {
            parse: function(text) {
                if (!text) return '';
                // Very basic markdown parsing
                return text
                    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/^/, '<p>')
                    .replace(/$/, '</p>');
            }
        };
    </script>
</body>
</html>
